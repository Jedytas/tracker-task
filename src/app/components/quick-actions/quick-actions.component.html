<mat-card appearance="outlined">
  <mat-card-header>
      <mat-card-title>
        <div class="d-flex align-items-center">
          <mat-icon class="me-2 text-primary">bolt</mat-icon>
          {{ languageService.t('quickActions.title') }}
        </div>
      </mat-card-title>
  </mat-card-header>
  <mat-card-content class="p-3">
    <div class="row g-3">
      <div class="col-md-4">
        <button 
          mat-raised-button 
          class="action-btn today-btn w-100"
          (click)="scrollToTaskList()"
          [matBadge]="getTodayTasks()"
          [matBadgeHidden]="getTodayTasks() === 0"
          matBadgeColor="primary"
        >
          <div class="btn-content">
            <mat-icon>today</mat-icon>
            <span>{{ languageService.t('quickActions.todayTasks') }}</span>
            <small class="text-muted">{{ languageService.t('quickActions.dueToday') }}</small>
          </div>
        </button>
      </div>
      <div class="col-md-4">
        <button 
          mat-raised-button 
          class="action-btn overdue-btn w-100"
          (click)="scrollToTaskList()"
          [matBadge]="getOverdueTasks()"
          [matBadgeHidden]="getOverdueTasks() === 0"
          matBadgeColor="warn"
        >
          <div class="btn-content">
            <mat-icon>warning</mat-icon>
            <span>{{ languageService.t('quickActions.overdue') }}</span>
            <small class="text-muted">{{ languageService.t('quickActions.pastDeadline') }}</small>
          </div>
        </button>
      </div>
      <div class="col-md-4">
        <button 
          mat-raised-button 
          class="action-btn priority-btn w-100"
          (click)="scrollToTaskList()"
          [matBadge]="getHighPriorityTasks()"
          [matBadgeHidden]="getHighPriorityTasks() === 0"
          matBadgeColor="accent"
        >
          <div class="btn-content">
            <mat-icon>priority_high</mat-icon>
            <span>{{ languageService.t('quickActions.highPriority') }}</span>
            <small class="text-muted">{{ languageService.t('quickActions.importantTasks') }}</small>
          </div>
        </button>
      </div>
    </div>
  </mat-card-content>
</mat-card>
