<div class="row g-4 mb-2">
    <div class="col-lg-12">
        <h2>
            {{ languageService.t('dashboard.hello') }}, {{commonService.userName() | titlecase}}! <i class="bi bi-emoji-smile ms-1"></i>
        </h2>
        <p class="text-muted mb-0">{{ languageService.t('dashboard.greeting') }}</p>
    </div>
</div>


<div class="row g-4 pb-4">

    <!-- Task Summary -->
    <div class="col-lg-12">
        <app-task-summary></app-task-summary>
    </div>

    <!-- Add Task and Statistics -->
    <div class="col-lg-6">
        <app-add-task></app-add-task>
    </div>  
    <div class="col-lg-6">
        <app-task-statistics></app-task-statistics>
    </div>

    <!-- Calendar and Productivity Chart -->
    <div class="col-lg-6">
        <app-task-calendar></app-task-calendar>
    </div>
    <div class="col-lg-6">
        <app-productivity-chart></app-productivity-chart>
    </div>

    <!-- Task List -->
    <div class="col-lg-12">
        <app-task-list></app-task-list>
    </div>
</div>
